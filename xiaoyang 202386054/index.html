<style>

/* 🏀 篮球风格配色 */
body{
    margin:0;
    font-family:Arial;
    background: linear-gradient(to right, #141e30, #243b55);
    color:white;
}

/* 导航栏 */
nav{
    background:#000;
    padding:15px;
    text-align:center;
}
nav a{
    color:white;
    margin:0 15px;
    text-decoration:none;
    font-weight:bold;
}
nav a:hover{
    color:#ff6a00; /* 篮球橙 */
}

/* 内容 */
.container{
    padding:20px;
}

/* 大图 */
.hero{
    width:100%;
    height:420px;
    object-fit:cover;
    border-radius:10px;
}

/* 比赛卡片 */
.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:10px;
    margin-top:15px;
    border-left:5px solid #ff6a00;
}

/* 图片墙 */
.grid{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}
.grid img{
    width:100%;
    border-radius:10px;
}

/* 比分板 */
.score{
    display:flex;
    justify-content:space-between;
    background:#000;
    padding:10px;
    border-radius:10px;
    margin-top:10px;
}

/* footer */
footer{
    text-align:center;
    padding:20px;
    background:#000;
    margin-top:30px;
}

</style>
